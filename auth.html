<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>MoonTV_Авторизация / MoonTV_Auth</title> -->
    <title>MoonTV_Авторизация</title>
    <link rel="icon" type="image/svg+xml" href="images/logo-moon-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
<script defer src="js/auth.js"></script><link href="auth.css" rel="stylesheet"></head>

<body>
    <div class="login-container">
        <div class="buttons">
            <!-- <button class="backBtn" type="button">
                <span>Назад</span> 
            </button> -->
            <a href="javascript:history.back()" class="btn-secondary">
                <div class="arrow-1">
                    <div></div>
                </div>
            </a>
            <!--The "Close" button is needed for pop-ups, not for pages: -->
            <!-- <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> -->
        </div>
        <div class="form">
            <form action="/login" id="loginForm" method="POST">
                <a href="./index.html" class="auth_logo mx-auto">
                    <img src="images/logo-moon-auth-page.png" alt="bootstrap-logo" style="width: 60px">
                </a>
                <!-- <h1>Вход на VK Planets (разные планеты-разные платформы по тематикам, описано в дизайн-концепции проекта)</h1> -->
                <h1>Вход на Moon TV</h1>
                <div class="form-floating">
                    <input type="email" name="email" placeholder="Email" required maxlength="60"/>
                    <!-- <span class = "error">Please provide a valid email</span> -->
                </div>
                <div class="form-floating">
                    <input type="password" name="password" placeholder="Password" required maxlength="60"/>
                    <!-- <span class = "error">Please provide a valid email</span> -->
                </div>
                <button type="submit" class="button-1">Войти</button>
                <button type="submit" class="button-2">Создать аккаунт</button>
                <div class="form-check">
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                <p class="copy">
                    &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;
                    Войти через
                    &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;
                </p>
                <button type="submit" class="button-3">
                    <div style="display: flex; flex-direction: row; align-items: flex-start; justify-items:auto">
                        <a href="https://vk.com/username" target="_blank" rel="noopenerer noreferrer">
                            <img src="images/mini-icons-vk-square.svg" alt="social-button" class="vk-id-button"
                                style="width: 30px">
                        </a>
                    </div>
                    Войти через VK ID
                </button>
                <!-- links from other streaming platforms: -->
                <div class="links">
                    <a href="https://vkvideo.ru/@channel" target="_blank" rel="noopenerer noreferrer">
                        <!--vkvideo icon-->
                        <img src="images/icon-vk-video.png" alt="social-button" class="social-button"
                            style="width: 40px; height: 40px">
                    </a>
                    <a href="https://www.rutube.ru/channel" target="_blank" class="rutube-button" rel="noopenerer noreferrer">
                        <!--rutube icon-->
                        <img src="images/icon-rutube.png" alt="social-button" class="social-button"
                            style="width: 40px; height: 40px">
                    </a>
                    <a href="https://www.youtube.com/@channel" target="_blank" rel="noopenerer noreferrer">
                        <!--youtube-live icon-->
                        <img src="images/icon-youtube-live.svg" alt="social-button" class="social-button"
                            style="width: 40px; height: 40px">
                    </a>
                    <a href="https://www.youtube.com/@channel" target="_blank" rel="noopenerer noreferrer">
                        <!--youtube icon-->
                        <img src="images/icon-youtube.svg" alt="social-button" class="social-button"
                            style="width: 40px; height: 40px">
                    </a>
                    <a href="https://vkplay.ru/live/" target="_blank" rel="noopenerer noreferrer">
                        <!--vkplay icon-->
                        <img src="images/icon-vk-play.png" alt="social-button" class="social-button"
                            style="width: 40px; height: 40px">
                    </a>
                </div>
            </form>
            <div id="message"></div>
        </div>
    </div>
</body>

</html>
