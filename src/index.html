<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonTV</title>
    <link rel="icon" type="image/svg+xml" href="./img/logo_moon_2.png">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/index.css">


    <link rel="stylesheet" href="./css/normilize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <script defer src="./js/bootstrap.min.js"></script>
    <!-- <script defer src="./index.js"></script> -->
</head>

<body>
    <header class="site-header">
        <div class="search">
            <label for="site-search" class="visually-hidden">Поиск по сайту</label>
            <input type="search" id="site-search" class="input-with-icon" placeholder="Поиск" aria-label="Search">
            <a href="#notifications" class="notification-round-button">
                <img src="./img/notifications_button.svg" class="button-icon" alt="Search" width="40px" height="40px">
            </a>
        </div>
        <div class="logo-container">
            <a href="#" class="logo-img">
                <img src="./img/logo_moon_1_1-3.png" style="width: 120px; height: 40px;" alt="MoonTV" class="logo-icon">
            </a>
            <h1 class="logo-text">Moon.tv</h1>
        </div>
        <div class="container-menu">
            <button class="menu-button" type="button" aria-label="Включить звуки музыку">
                <a href="">
                    <img src="./img/music.svg" alt="login" width="30px" height="30px">
                </a>
            </button>
            <button class="menu-button" type="button" aria-label="Переключить тему оформления">
                <a href="">
                    <img src="./img/theme.svg" alt="login" width="30px" height="30px">
                </a>
            </button>
            <button class="menu-button" type="button" aria-label="Выбрать язык оформления">
                <a href="">
                    <img src="./img/language.svg" alt="login" width="30px" height="30px">
                </a>
            </button>
            <button class="menu-button" type="button" aria-label="Войти в свой аккаунт">
                <a href="">
                    <img src="./img/signUp_signIn.svg" alt="login" width="30px" height="30px">
                </a>
            </button>
            <div class="login">
                <button class="login-button" type="button" aria-label="Войти в личный кабинет">
                    <a href="">
                        <img src="./img/ava.svg" style="width: 60px; height: 60px;" alt="personal account">
                    </a>
                </button>
            </div>
        </div>
    </header>
    <main>
        <div class="vertical-puzzle">
            <div class="vertical-menu"></div>
            <div class="main-of-the-main">
                <div class="horizontal-puzzle">
                    <div class="b1">
                        <div class="horizontal-menu"></div>
                        <div class="main-banner">
                            <div class="screen">
                                <iframe width="1138px" height="574px"
                                    src="https://www.youtube.com/embed/jfKfPfyJRdk?si=eavHTgCuUL64LPPd"
                                    title="YouTube video player" frameborder="0"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                            </div>
                            <div class="promo">
                                <div class="promo1"></div>
                                <div class="promo2"></div>
                                <div class="promo3"></div>
                                <div class="promo4"></div>
                                <div class="promo5"></div>
                            </div>
                        </div>
                        <div class="horizontal-titles">
                            <div class="favor-ch-name"></div>
                            <div class="show-all"></div>
                        </div>
                        <div class="horizontal-channels">
                            <div class="favor-category"></div>
                            <div class="favor-channels"></div>
                            <div class="favor-category"></div>
                            <div class="favor-channels"></div>
                            <div class="favor-category"></div>
                            <div class="favor-channels"></div>
                            <div class="favor-category"></div>
                        </div>
                    </div>
                    <div class="b2">
                        <div class="horizontal-title"></div>
                        <div class="section1">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section2">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section3">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section4">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section5">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section6">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section7">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="section8">
                            <div class="title-row">
                                <div class="section-title"></div>
                                <div class="show-all-title"></div>
                            </div>
                            <div class="section-chanels"></div>
                            <div class="show-all-link"></div>
                        </div>
                        <div class="show-all-button-row">
                            <button class="show-all-button" type="button"
                                aria-label="Перейти в раздел всех категорий и жанров">Посмотреть все категории</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="notification"></div>
    </main>
    <footer>
        <!-- <div class="image-container">
            <img src="../img/auth_background_2.png" alt="moon">
        </div> -->
    </footer>
</body>

</html>
