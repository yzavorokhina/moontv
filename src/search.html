<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonTV</title>
    <link rel="icon" type="image/svg+xml" href="./img/logo-moon-favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="page">

        <div id="react-header" class="site-header">
            <!-- React component -->
        </div>

        <main>
            <div class="vertical-blocks">
                <div class="vertical-menu-container">
                    <nav class="vertical-menu" id="vertical-menu">
                        <!-- React component -->
                    </nav>
                </div>
                <div class="main-of-the-main">
                    <div class="horizontal-blocks">
                        <div class="main-screen-block">

                            <div id="react-horizontal-menu" class="horizontal-menu">
                                <!-- React component -->
                            </div>

                        </div>
                        <div class="favourite-categories">
                            <div class="favourite-categories-title">
                                <h2>Результаты поиска:</h2>
                            </div>
                            <div class="favourite-category-container">

                                <div class="channels-row" id="search_result">
                                    <!-- React component -->
                                </div>

                                <div class="show-all-link divider-container">
                                    <div class="divider-line"></div>
                                    <button class="divider-button">
                                        <a href='./categories.html' class="arrowed">
                                            Показать все
                                            <!-- License: MIT. Made by Shopify: https://github.com/Shopify/polaris -->
                                            <svg class="show-all-arrow" width="24px" height="24px" viewBox="0 0 24 24"
                                                xmlns="http://www.w3.org/2000/svg">
                                                <path
                                                    d="M17.707 9.293l-5-5a.999.999 0 10-1.414 1.414L14.586 9H3a1 1 0 100 2h11.586l-3.293 3.293a.999.999 0 101.414 1.414l5-5a.999.999 0 000-1.414z"
                                                    fill="#CECED6" />
                                            </svg>
                                        </a>
                                    </button>
                                    <div class="divider-line"></div>
                                </div>
                            </div>
                            <div class="show-all-button-row">
                                <button class="show-all-button" type="button"
                                    onclick="window.location.href='./index.html'"
                                    aria-label="Перейти в раздел всех категорий и жанров">Назад на главную</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="notification" id="myElement">
                <img class="notification-moon-logo-1" src="./img/notification-moon-1.svg" alt="moon-logo">
                <img class="notification-moon-logo-2" src="./img/notification-moon-2.svg" alt="moon-logo">
                <img class="notification-moon-logo-3" src="./img/notification-moon-3.svg" alt="moon-logo">
                <a href="/page" class="link-wrapper">
                    <h4>Присоединяйтесь к сообществу межгалактических трансляций на Moon.tv!</h4>
                </a>
                <a href="/page" class="link-wrapper">
                    <button type="button" class="button-notification">Войти / Регистрация</button>
                </a>
                <button id="closeButton" type="button" class="btn-close" aria-label="Close"></button>
            </div>
        </main>
        <footer class="site-footer" id="react-footer">
            <!-- React component -->
        </footer>
    </div>
</body>

</html>
