        <div class="buttons">
            <a href="javascript:history.back()" class="btn-secondary">
                <div class="arrow-1">
                    <div></div>
                </div>

        <div class="form">

            <form action="/login" id="registration_form" method="POST">
                <a href="/dist/index.html" class="auth_logo mx-auto">
                    <img src="./img/logo_moon_1.png" alt="bootstrap-logo" style="width: 60px">
                </a>
                <h1>Вход в VK Planets</h1>

                <div class="form-floating">

                    <input type="email" name="email" placeholder="Email или телефон" required
                        pattern="^([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3})|(\d{3}-\d{3}-\d{4})$" />
                    <!-- <span class = "error">Please provide a valid telephone or email</span> -->

                </div>

                <button type="submit" class="button-1">Продолжить</button>
                <button type="submit" class="button-2">Создать аккаунт с VK ID</button>

                <div class="form-check">
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>

                <p class="copy">
                    &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;
                    Войти через
                    &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;&mdash;
                </p>
                <button type="submit" class="button-3">
                    <div style="display: flex; flex-direction: row; align-items: flex-start; justify-items:auto">

                        <a href="https://vk.com/username" target="_blank" rel="noopenerer noreferrer">
                            <img src="./img/mini-icons-vk-square.svg" alt="social-button" class="vk-id-button"
                                style="width: 30px">
                        </a>

                    </div>
                    Войти через VK ID
                </button>
